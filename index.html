<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>monotoria-Demo</title>
    <link rel="icon" type="image/png" href="image.png" />
  </head>
  <style>
    body {
      margin: 0%;
      background: #ffffff;
      background: #ffffff;
      background: linear-gradient(
        180deg,
        rgb(181, 181, 181) 20%,
        rgba(84, 84, 84, 1) 70%
      );
      background-repeat: no-repeat;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #canvas {
      background-color: white;
      border: solid 20px rgba(84, 84, 84, 1);
      border-radius: 15px;
    }
    #title {
      position: absolute;
      top: 0px;
      left: 0px;
      transform: scale(0.3);
      transform-origin: top left;
    }
  </style>
  <body>
    <div id="title"><img src="monotoria.webp" /></div>
    <canvas id="canvas"></canvas>
    <script>
      const c = document.querySelector("#canvas").getContext("2d");
      const canvas = document.querySelector("#canvas");
      canvas.width = 400;
      canvas.height = 400;
      //screen object
      const pov = {
        position: [0, 0, 0],
        direction: [0, 0],
      };
      const lineDraw = (x, y, z, size, deg) => {
        if (pov.position[0] > x || pov.position[1] > y || pov.position[2] > z) {
          return;
        }
        c.strokeStyle = "black";
        c.beginPath();
        c.moveTo(x, y);
        c.lineTo(
          x - pov.position[0] + (size - z + pov.position[2]),
          y - pov.position[1],
        );
        c.moveTo(x, y);
        c.lineTo(
          x - pov.position[0] - (size - z + pov.position[2]),
          y - pov.position[1],
        );
        c.stroke();
        c.closePath();
      };
      const coords = {
        direction: [0, 0, 0],
        draw: () => {
          c.strokeStyle = "blue";
          c.beginPath();
          c.moveTo(200 - pov.position[0], 0);
          c.lineTo(200 - pov.position[0], 400);
          c.stroke();
          c.closePath();
          // y axis
        },
      };
      // entities
      window.addEventListener("keydown", (event) => {
        switch (event.key) {
          case "ArrowUp":
            break;
          case "ArrowDown":
            break;
          case "ArrowLeft":
            break;
          case "ArrowRight":
            break;

          case "w":
            pov.position[2] += 5;
            break;
          case "a":
            pov.position[0] -= 5;
            break;

          case "s":
            pov.position[2] -= 5;
            break;
          case "d":
            pov.position[0] += 5;
            break;
          default:
            return;
        }
      });
      // action
      const gameLoop = setInterval(() => {
        c.clearRect(0, 0, 1000, 400);
        coords.draw();
        lineDraw(200, 200, 2, 100);
      }, 30);
      //game loop
    </script>
  </body>
</html>
